<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="globe-grad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#5AAAC8"/>
      <stop offset="100%" stop-color="#2AA198"/>
    </linearGradient>
    <linearGradient id="vort-pos" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E63946" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E63946" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="vort-neg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#457B9D" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#457B9D" stop-opacity="0.4"/>
    </linearGradient>
    <clipPath id="globe-clip">
      <circle cx="256" cy="240" r="155"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Globe sphere -->
  <circle cx="256" cy="240" r="155" fill="url(#globe-grad)"/>

  <!-- Graticule lines (clipped to globe) -->
  <g clip-path="url(#globe-clip)" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.2" fill="none">
    <!-- Equator -->
    <ellipse cx="256" cy="240" rx="155" ry="8"/>
    <!-- Latitude lines -->
    <ellipse cx="256" cy="195" rx="140" ry="7"/>
    <ellipse cx="256" cy="285" rx="140" ry="7"/>
    <ellipse cx="256" cy="155" rx="110" ry="5"/>
    <ellipse cx="256" cy="325" rx="110" ry="5"/>
    <!-- Meridians -->
    <ellipse cx="256" cy="240" rx="8" ry="155"/>
    <ellipse cx="256" cy="240" rx="55" ry="155"/>
    <ellipse cx="256" cy="240" rx="100" ry="155"/>
    <ellipse cx="256" cy="240" rx="135" ry="155"/>
  </g>

  <!-- Vorticity dipole pattern (clipped to globe) -->
  <g clip-path="url(#globe-clip)">
    <!-- Positive vorticity (cyclonic, red) -->
    <circle cx="220" cy="200" r="42" fill="url(#vort-pos)" opacity="0.7"/>
    <circle cx="220" cy="200" r="25" fill="#E63946" opacity="0.5"/>
    <!-- Negative vorticity (anticyclonic, blue) -->
    <circle cx="295" cy="275" r="42" fill="url(#vort-neg)" opacity="0.7"/>
    <circle cx="295" cy="275" r="25" fill="#457B9D" opacity="0.5"/>
  </g>

  <!-- Globe highlight (specular) -->
  <ellipse cx="215" cy="190" rx="60" ry="45" fill="#ffffff" opacity="0.08"/>

  <!-- Lens / scope ring -->
  <circle cx="256" cy="240" r="155" fill="none" stroke="#1B6B65" stroke-width="6"/>
  <circle cx="256" cy="240" r="160" fill="none" stroke="#2AA198" stroke-width="2" opacity="0.5"/>

  <!-- Scope handle -->
  <line x1="365" y1="350" x2="420" y2="405" stroke="#1B6B65" stroke-width="10" stroke-linecap="round"/>
  <line x1="365" y1="350" x2="420" y2="405" stroke="#2AA198" stroke-width="6" stroke-linecap="round"/>

  <!-- Text: GeoScope -->
  <text x="256" y="450" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="56" fill="#E8E8E8" letter-spacing="3">
    <tspan fill="#2AA198">Geo</tspan><tspan fill="#E8E8E8">Scope</tspan>
  </text>

  <!-- Tagline -->
  <text x="256" y="485" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="18" fill="#888888" letter-spacing="5">
    OPEN · SEE · EXPLORE
  </text>
</svg>
